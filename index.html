<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2deWt</title>
    <link rel="icon" type="image/png" href="assets/images/2dW.png">
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>
    <div id="auth-screen">
        <div class="auth-container">
            <h1>2deWt</h1>
            <p>Welcome, gng.</p>
            <form id="auth-form">
                <input type="text" id="username" placeholder="Username" required />
                <input type="password" id="password" placeholder="Password" required />
                <div class="auth-buttons">
                    <button type="button" id="login-btn">Login</button>
                    <button type="button" id="register-btn" style="display: none;">Register</button>
                </div>
            </form>
        </div>
    </div>

    <div id="main-content" style="display: none;">
        <div class="header">
            <h1>2deWt</h1>
            <button id="logout-btn">Logout</button>
        </div>
        <label class="toggle-switch party-toggle">
            <input type="checkbox" id="party-mode-btn">
            <span class="slider"></span>
            <span class="label-text">Party Mode</span>
        </label>
        <form id="todo-form">
            <input type="text" id="new-item" placeholder="whats on the menu gng" required />
            <button type="submit">Add</button>
        </form>
        <div id="actions">
            <button id="clear-all-btn">Clear All</button>
            <button id="fidget-btn">
                <span>F4</span>
            </button>
        </div>
        <ul id="todo-list"></ul>
        <div id="party-container" style="display: none;">
            <img id="party-gif" src="assets/gifs/osaka-azumanga-daioh.gif" alt="party" />
            <div id="party-video">
                <iframe width="100%" height="300" src="https://www.youtube.com/embed/PDJLvF1dUek?autoplay=0&loop=1&playlist=PDJLvF1dUek" title="Party Music" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
